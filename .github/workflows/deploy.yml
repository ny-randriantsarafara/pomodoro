name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:run

  build:
    name: Build & Push image
    needs: validate
    uses: ny-randriantsarafara/vps-services/.github/workflows/build-image.yml@main
    with:
      image: ghcr.io/ny-randriantsarafara/pomodoro
      context: .
      dockerfile: Dockerfile
      stable_tag: latest

  migrate-on-vps:
    name: Run DB migrations on VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Warn on destructive migration patterns
        run: npm run db:check-risk
      - name: Run migrations inside VPS network
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          IMAGE: ghcr.io/ny-randriantsarafara/pomodoro:latest
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_HOST_KEY" > ~/.ssh/known_hosts
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps.key
          chmod 600 ~/.ssh/vps.key
          ssh -i ~/.ssh/vps.key -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" <<'EOF'
            set -euo pipefail
            DEPLOY_DIR="/home/deploy/apps/pomodoro"
            IMAGE="ghcr.io/ny-randriantsarafara/pomodoro:latest"
            ENV_FILE="$DEPLOY_DIR/.migration.env"

            mkdir -p "$DEPLOY_DIR"
            printf '%s\n' "DATABASE_URL=${{ secrets.DATABASE_URL }}" > "$ENV_FILE"
            trap 'rm -f "$ENV_FILE"' EXIT

            docker pull "$IMAGE"
            docker run --rm \
              --network vps-net \
              --env-file "$ENV_FILE" \
              "$IMAGE" \
              node scripts/migrate.mjs
          EOF

  prepare-deploy:
    name: Prepare deploy inputs
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      runtime_env: ${{ steps.values.outputs.runtime_env }}
    steps:
      - name: Collect deploy values
        id: values
        env:
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
        run: |
          {
            echo "runtime_env<<EOF"
            printf '%s\n' \
              "NEXTAUTH_URL=$NEXTAUTH_URL" \
              "AUTH_TRUST_HOST=true"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to VPS
    needs: [build, prepare-deploy, migrate-on-vps]
    if: github.ref == 'refs/heads/main'
    uses: ny-randriantsarafara/vps-services/.github/workflows/deploy-compose.yml@main
    with:
      deploy_dir: /home/deploy/apps/pomodoro
      compose_file: deploy/docker-compose.yml
      services: pomodoro
      runtime_env: ${{ needs.prepare-deploy.outputs.runtime_env }}
      bootstrap_databases: pomodoro
      health_retries: 15
      health_interval: 5
    secrets:
      vps_user_secret: ${{ secrets.VPS_USER }}
      vps_host_secret: ${{ secrets.VPS_HOST }}
      runtime_env_secret: |
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        AUTH_SECRET=${{ secrets.AUTH_SECRET }}
        AUTH_GITHUB_ID=${{ secrets.AUTH_GITHUB_ID }}
        AUTH_GITHUB_SECRET=${{ secrets.AUTH_GITHUB_SECRET }}
        AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID }}
        AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}
        GITHUB_CONNECTIONS_CLIENT_ID=${{ secrets.GH_CONNECTIONS_CLIENT_ID }}
        GITHUB_CONNECTIONS_CLIENT_SECRET=${{ secrets.GH_CONNECTIONS_CLIENT_SECRET }}
      vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
      vps_host_key: ${{ secrets.VPS_HOST_KEY }}
