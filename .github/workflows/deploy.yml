name: Build & Deploy

on:
    push:
        branches: [main]
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}
    DEPLOY_DIR: /home/deploy/apps/pomodoro

jobs:
    validate:
        name: Lint & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci
            - run: npm run lint
            - run: npm run test:run

    build:
        name: Build & Push image
        runs-on: ubuntu-latest
        needs: validate
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
              id: meta
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha
                      type=raw,value=latest,enable={{is_default_branch}}

            - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    deploy:
        name: Deploy to VPS
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/main'
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.0
              with:
                  ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

            - name: Add VPS to known hosts
              env:
                  VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
              run: |
                  mkdir -p ~/.ssh
                  echo "$VPS_HOST_KEY" >> ~/.ssh/known_hosts

            - name: Sync deploy files to VPS
              env:
                  VPS_USER: ${{ secrets.VPS_USER }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
              run: |
                  ssh "$VPS_USER@$VPS_HOST" "mkdir -p ${{ env.DEPLOY_DIR }}"
                  scp deploy/docker-compose.yml "$VPS_USER@$VPS_HOST:${{ env.DEPLOY_DIR }}/docker-compose.yml"

            - name: Write .env on VPS
              env:
                  VPS_USER: ${{ secrets.VPS_USER }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
                  AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
                  AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
                  AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
                  AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
                  NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
                  AUTH_TRUST_HOST: 'true'
                  GITHUB_CONNECTIONS_CLIENT_ID: ${{ secrets.GH_CONNECTIONS_CLIENT_ID }}
                  GITHUB_CONNECTIONS_CLIENT_SECRET: ${{ secrets.GH_CONNECTIONS_CLIENT_SECRET }}
              run: |
                  tmp_env=$(mktemp)
                  cat > "$tmp_env" <<EOF
                  DATABASE_URL=$DATABASE_URL
                  AUTH_SECRET=$AUTH_SECRET
                  AUTH_GITHUB_ID=$AUTH_GITHUB_ID
                  AUTH_GITHUB_SECRET=$AUTH_GITHUB_SECRET
                  AUTH_GOOGLE_ID=$AUTH_GOOGLE_ID
                  AUTH_GOOGLE_SECRET=$AUTH_GOOGLE_SECRET
                  NEXTAUTH_URL=$NEXTAUTH_URL
                  AUTH_TRUST_HOST=$AUTH_TRUST_HOST
                  GITHUB_CONNECTIONS_CLIENT_ID=$GITHUB_CONNECTIONS_CLIENT_ID
                  GITHUB_CONNECTIONS_CLIENT_SECRET=$GITHUB_CONNECTIONS_CLIENT_SECRET
                  EOF
                  sed -i 's/^[[:space:]]*//' "$tmp_env"
                  ssh "$VPS_USER@$VPS_HOST" \
                    "cat > ${{ env.DEPLOY_DIR }}/.env.tmp && mv ${{ env.DEPLOY_DIR }}/.env.tmp ${{ env.DEPLOY_DIR }}/.env" \
                    < "$tmp_env"
                  rm -f "$tmp_env"

            - name: Create database and deploy
              env:
                  VPS_USER: ${{ secrets.VPS_USER }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
              run: |
                  ssh "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
                    set -e
                    DEPLOY_DIR=${{ env.DEPLOY_DIR }}
                    cd "$DEPLOY_DIR"

                    echo "Creating pomodoro database if it doesn't exist..."
                    docker exec supabase-db psql -U postgres -tc \
                      "SELECT 1 FROM pg_database WHERE datname = 'pomodoro'" \
                      | grep -q 1 \
                      || docker exec supabase-db psql -U postgres -c "CREATE DATABASE pomodoro"

                    echo "Pulling latest image..."
                    docker compose pull

                    echo "Starting pomodoro..."
                    docker compose up -d --remove-orphans

                    echo "Waiting for pomodoro to become healthy..."
                    MAX_RETRIES=15
                    SLEEP_SECS=5
                    for i in $(seq 1 $MAX_RETRIES); do
                      CID=$(docker compose ps -q pomodoro 2>/dev/null)
                      if [[ -z "$CID" ]]; then
                        echo "Attempt $i/$MAX_RETRIES: container not found yet"
                        sleep $SLEEP_SECS
                        continue
                      fi
                      STATE=$(docker inspect --format="{{.State.Status}}" "$CID" 2>/dev/null || echo "unknown")
                      HEALTH=$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}" "$CID" 2>/dev/null || echo "unknown")
                      if [[ "$STATE" == "running" ]] && [[ "$HEALTH" == "healthy" || "$HEALTH" == "none" ]]; then
                        echo "Pomodoro is healthy"
                        exit 0
                      fi
                      echo "Attempt $i/$MAX_RETRIES: state=$STATE health=$HEALTH"
                      sleep $SLEEP_SECS
                    done
                    echo "Health check failed"
                    docker compose logs pomodoro --tail=50
                    exit 1
                  REMOTE
