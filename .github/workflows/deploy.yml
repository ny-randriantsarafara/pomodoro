name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:run

  build:
    name: Build & Push image
    needs: validate
    uses: ny-randriantsarafara/vps-services/.github/workflows/build-image.yml@main
    with:
      image: ghcr.io/ny-randriantsarafara/pomodoro
      context: .
      dockerfile: Dockerfile
      stable_tag: latest

  prepare-deploy:
    name: Prepare deploy inputs
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      vps_user: ${{ steps.values.outputs.vps_user }}
      vps_host: ${{ steps.values.outputs.vps_host }}
      runtime_env: ${{ steps.values.outputs.runtime_env }}
    steps:
      - name: Collect deploy values
        id: values
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          GITHUB_CONNECTIONS_CLIENT_ID: ${{ secrets.GH_CONNECTIONS_CLIENT_ID }}
          GITHUB_CONNECTIONS_CLIENT_SECRET: ${{ secrets.GH_CONNECTIONS_CLIENT_SECRET }}
        run: |
          {
            echo "vps_user=$VPS_USER"
            echo "vps_host=$VPS_HOST"
            echo "runtime_env<<EOF"
            printf '%s\n' \
              "DATABASE_URL=$DATABASE_URL" \
              "AUTH_SECRET=$AUTH_SECRET" \
              "AUTH_GITHUB_ID=$AUTH_GITHUB_ID" \
              "AUTH_GITHUB_SECRET=$AUTH_GITHUB_SECRET" \
              "AUTH_GOOGLE_ID=$AUTH_GOOGLE_ID" \
              "AUTH_GOOGLE_SECRET=$AUTH_GOOGLE_SECRET" \
              "NEXTAUTH_URL=$NEXTAUTH_URL" \
              "AUTH_TRUST_HOST=true" \
              "GITHUB_CONNECTIONS_CLIENT_ID=$GITHUB_CONNECTIONS_CLIENT_ID" \
              "GITHUB_CONNECTIONS_CLIENT_SECRET=$GITHUB_CONNECTIONS_CLIENT_SECRET"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to VPS
    needs: [build, prepare-deploy]
    if: github.ref == 'refs/heads/main'
    uses: ny-randriantsarafara/vps-services/.github/workflows/deploy-compose.yml@main
    with:
      vps_user: ${{ needs.prepare-deploy.outputs.vps_user }}
      vps_host: ${{ needs.prepare-deploy.outputs.vps_host }}
      deploy_dir: /home/deploy/apps/pomodoro
      compose_file: deploy/docker-compose.yml
      services: pomodoro
      runtime_env: ${{ needs.prepare-deploy.outputs.runtime_env }}
      bootstrap_databases: pomodoro
      health_retries: 15
      health_interval: 5
    secrets:
      vps_ssh_key: ${{ secrets.VPS_SSH_KEY }}
      vps_host_key: ${{ secrets.VPS_HOST_KEY }}
